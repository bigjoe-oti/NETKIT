name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  # Prove the package imports and the executable builds on all three OSes.
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Import check
        run: python -c "import netkit, netkit.server, netkit.probes, netkit.ledger; print('import OK', netkit.__version__)"
      - name: Build single-file executable (zipapp)
        run: python -m zipapp netkit -m "netkit.server:main" -o netkit.pyz
      - name: Boot test (start, probe, stop)
        shell: bash
        run: |
          python netkit.pyz &
          PID=$!
          sleep 4
          curl -fsS http://127.0.0.1:8787/ >/dev/null && echo "dashboard served"
          curl -fsS http://127.0.0.1:8787/api >/dev/null && echo "ledger api served"
          kill $PID 2>/dev/null || true
        env:
          NETKIT_PORT: "8787"

  release:
    needs: smoke
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build artifacts
        run: |
          python -m zipapp netkit -m "netkit.server:main" -p "/usr/bin/env python3" -o netkit.pyz
          python -m pip install --upgrade build
          python -m build
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netkit.pyz
            dist/*.whl
            dist/*.tar.gz
